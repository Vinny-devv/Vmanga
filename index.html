<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vnovels - عالم المانجا والمانهوا</title>
    <link rel="stylesheet" href="style.css">
    <!-- كود إعداد الاستيراد للـ Firebase Modules -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
</head>
<body>

    <!-- شريط التنقل العلوي (Navbar) -->
    <nav class="navbar">
        <div class="nav-links">
            <button id="home-btn" class="nav-link active">الرئيسية</button>
            <button id="genres-btn" class="nav-link">التصنيفات</button>
            <button id="admin-panel-btn" class="nav-link hidden">لوحة التحكم</button> 
        </div>
        
        <div class="auth-section">
            <button id="login-btn" class="login-auth-btn">تسجيل الدخول</button>
            <div id="user-profile" class="user-profile hidden">
                <img id="user-avatar" src="" alt="Avatar">
                <button id="logout-btn" class="logout-auth-btn">خروج</button>
            </div>
        </div>
    </nav>

    <!-- الواجهة الرئيسية وقسم التصنيفات -->
    <main class="container">
        
        <!-- قسم التصنيفات (مخفي افتراضياً ويظهر عند الضغط) -->
        <section id="genres-section" class="page-section hidden">
            <div class="genres-container">
                <span class="genre-tag" data-genre="أكشن">أكشن</span>
                <span class="genre-tag" data-genre="مغامرة">مغامرة</span>
                <span class="genre-tag" data-genre="خيال">خيال</span>
                <span class="genre-tag" data-genre="دراما">دراما</span>
                <span class="genre-tag" data-genre="رعب">رعب</span>
                <span class="genre-tag" data-genre="رومانسية">رومانسية</span>
            </div>
        </section>

        <!-- قسم قائمة المانجا الأساسي -->
        <section id="home-section" class="page-section">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="ابحث عن مانجا...">
                <button id="search-btn">بحث</button>
            </div>
            <div id="manga-grid" class="manga-grid">
                <!-- المانجا ستظهر هنا برمجياً -->
            </div>
        </section>

        <!-- قسم تفاصيل المانجا والفصول -->
        <section id="details-section" class="page-section hidden">
            <button class="back-btn">⬅ عودة للرئيسية</button>
            <div class="manga-details-container">
                <img id="detail-cover" src="" alt="غلاف المانجا">
                <div class="manga-info-text">
                    <h2 id="detail-title">---</h2>
                    <div id="detail-genres"></div>
                    <p id="detail-description">---</p>
                </div>
            </div>
            <div class="chapters-wrapper">
                <h3>الفصول المتوفرة</h3>
                <div id="chapters-list" class="chapters-grid"></div>
            </div>
        </section>

        <!-- قسم قارئ الفصول الاحترافي للمانهوا -->
        <section id="reader-section" class="page-section hidden">
            <div class="reader-actions">
                <button class="back-to-manga-btn">⬅ العودة للتفاصيل</button>
                <h2 id="reader-chapter-title">الفصل</h2>
            </div>
            <div id="viewer-images" class="viewer-images">
                <!-- صفحات المانهوا الطولية ستعرض هنا برمجياً -->
            </div>
            
            <!-- قسم التعليقات والنقاشات -->
            <div class="comments-section">
                <h3>النقاشات والتعليقات</h3>
                <div class="login-prompt">يجب عليك تسجيل الدخول عبر الـ Gmail لتتمكن من كتابة تعليق.</div>
                <div id="actual-comment-form" class="comment-form hidden">
                    <textarea id="comment-text" placeholder="اكتب تعليقك هنا بكل احترام..."></textarea>
                    <button id="submit-comment-btn">إرسال التعليق</button>
                </div>
                <div id="comments-list" class="comments-list"></div>
            </div>
        </section>

        <!-- لوحة تحكم الإدارة (الأدمن) -->
        <section id="admin-section" class="page-section hidden">
            <button class="back-btn">⬅ عودة للرئيسية</button>
            <div class="admin-grid">
                
                <!-- إضافة عمل جديد -->
                <div class="admin-card">
                    <h3>إضافة عمل مانجا جديد</h3>
                    <input type="text" id="admin-manga-title" placeholder="اسم المانجا">
                    <input type="text" id="admin-manga-genres" placeholder="التصنيفات (افصل بينها بفاصلة ,)">
                    <textarea id="admin-manga-desc" placeholder="قصة ونبذة عن العمل"></textarea>
                    <label>صورة الغلاف من المعرض:</label>
                    <input type="file" id="admin-manga-cover" accept="image/*">
                    <button id="save-manga-btn">حفظ وتثبيت المانجا</button>
                </div>

                <!-- إضافة فصل داخل عمل موجود -->
                <div class="admin-card">
                    <h3>نشر فصل جديد</h3>
                    <label>اختر المانجا:</label>
                    <select id="admin-manga-select"></select>
                    <input type="number" id="admin-chapter-number" placeholder="رقم الفصل">
                    <label>اختر جميع صفحات الفصل من المعرض دفعة واحدة:</label>
                    <input type="file" id="admin-chapter-pages" accept="image/*" multiple>
                    <button id="save-chapter-btn">نشر الفصل بالكامل</button>
                    <div id="upload-progress" class="progress-status"></div>
                </div>

            </div>
        </section>

    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
